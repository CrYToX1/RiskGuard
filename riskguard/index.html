<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard - Dispečink</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        h1 { color: #f87171; text-align: center; }
        .login-box { background: #1e2937; padding: 50px; border-radius: 12px; max-width: 420px; margin: 100px auto; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 6px; border: none; font-size: 16px; }
        button { padding: 14px 30px; background: #f87171; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; }
        .dashboard { background: #1e2937; padding: 30px; border-radius: 12px; display: none; }
        .high-risk { color: #ef4444; background: #450a0a; padding: 18px; border-radius: 8px; margin: 15px 0; }
        .loading { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">

        <!-- LOGIN -->
        <div id="loginScreen" class="login-box">
            <h1>RiskGuard</h1>
            <h2 style="text-align:center; color:#94a3b8;">Dispečink</h2>
            <input type="text" id="username" placeholder="Uživatelské jméno" value="dispecink">
            <input type="password" id="password" placeholder="Heslo" value="riskguard2026">
            <button onclick="login()">Přihlásit se</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="dashboard">
            <div style="display:flex; justify-content:space-between;">
                <h1>RiskGuard - Prevence nehod</h1>
                <button onclick="logout()">Odhlásit</button>
            </div>
            <p>Přihlášen: <strong id="userDisplay">dispecink</strong></p>

            <h3>📸 Nahraj snímek z dopravní kamery</h3>
            <input type="file" id="upload" accept="image/*">

            <div id="preview"></div>
            <div id="status" class="loading"></div>
            <div id="result"></div>

            <h3>📊 Historie analýz</h3>
            <div id="history"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script>
        let model = null;

        async function loadModel() {
            document.getElementById('status').textContent = "Načítám AI model...";
            try {
                model = await tf.loadLayersModel('./model/model.json');
                document.getElementById('status').innerHTML = "✅ <strong>Model načten úspěšně</strong>";
            } catch(e) {
                document.getElementById('status').innerHTML = "❌ Chyba načtení modelu. Zkontroluj strukturu složky 'model'";
                console.error(e);
            }
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (user === "dispecink" && pass === "riskguard2026") {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                loadModel();
            } else {
                alert("Špatné přihlašovací údaje!\n\nUživatel: dispecink\nHeslo: riskguard2026");
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = "block";
            document.getElementById('dashboard').style.display = "none";
        }

        // Analýza obrázku
        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                document.getElementById('preview').innerHTML = 
                    `<img src="${ev.target.result}" id="img" style="max-width:100%; border-radius:10px; margin:15px 0;">`;

                const img = document.getElementById('img');
                const status = document.getElementById('status');

                img.onload = async () => {
                    if (!model) {
                        status.textContent = "Model ještě není načten...";
                        return;
                    }

                    status.textContent = "🔄 Analyzuji obrázek...";

                    const tensor = tf.browser.fromPixels(img)
                        .resizeNearestNeighbor([64, 64])
                        .expandDims(0)
                        .toFloat()
                        .div(255.0);

                    const prediction = model.predict(tensor);
                    const results = await prediction.array();
                    const classes = ['volny_provoz', 'kolona', 'rizikova_situace', 'chodci_cykliste'];
                    const maxIndex = results[0].indexOf(Math.max(...results[0]));
                    const confidence = (results[0][maxIndex] * 100).toFixed(1);

                    let output = `<strong>Situace:</strong> ${classes[maxIndex].replace('_',' ')} (${confidence}%)<br><br>`;

                    if (classes[maxIndex] === 'rizikova_situace' || classes[maxIndex] === 'chodci_cykliste') {
                        output += `<div class="high-risk">⚠ VYSOKÉ RIZIKO NEHODY<br>Doporučení: Okamžitý zásah</div>`;
                    } else {
                        output += `✅ Situace v normě`;
                    }

                    document.getElementById('result').innerHTML = output;
                    status.textContent = "Analýza dokončena";
                };
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
