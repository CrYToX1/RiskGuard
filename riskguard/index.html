<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskGuard | Dispečink Středočeského kraje</title>
    <style>
        :root {
            --primary: #e11d48;
            --dark: #0f172a;
            --card: #1e2937;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: var(--dark); 
            color: #e2e8f0; 
        }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        h1 { color: white; text-align: center; font-size: 2.4em; margin: 0; }
        .header { background: #1e2937; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        
        .login-box { 
            background: var(--card); 
            padding: 60px 40px; 
            border-radius: 16px; 
            max-width: 440px; 
            margin: 120px auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border-radius: 8px; 
            border: none; 
            background: #334155; 
            color: white; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 17px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #f43f5e; }

        .dashboard { display: none; }
        .status { 
            padding: 15px; 
            background: #334155; 
            border-radius: 8px; 
            margin: 15px 0; 
            font-weight: 500;
        }
        .high-risk { 
            background: #450a0a; 
            color: #fda4af; 
            padding: 20px; 
            border-radius: 10px; 
            border-left: 6px solid #ef4444;
        }
        img { 
            max-width: 100%; 
            border-radius: 12px; 
            margin: 15px 0; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- LOGIN -->
        <div id="loginScreen" class="login-box">
            <h1>RiskGuard</h1>
            <p style="text-align:center; color:#94a3b8; margin:20px 0;">Dispečink Středočeského kraje</p>
            <input type="text" id="username" placeholder="Uživatelské jméno" value="dispecink">
            <input type="password" id="password" placeholder="Heslo" value="riskguard2026">
            <button onclick="login()">Přihlásit se do systému</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="dashboard">
            <div class="header">
                <h1>RiskGuard</h1>
                <p style="text-align:center; margin:10px 0;">Systém prevence dopravních nehod</p>
                <div style="text-align:right;">
                    Přihlášen: <strong id="userDisplay"></strong> 
                    <button onclick="logout()" style="background:#475569; padding:8px 18px; font-size:14px; width:auto;">Odhlásit</button>
                </div>
            </div>

            <h3>📸 Analýza dopravní kamery</h3>
            <input type="file" id="upload" accept="image/*" style="margin-bottom:15px;">

            <div id="preview"></div>
            <div id="status" class="status">Načítám AI model...</div>
            <div id="result"></div>

            <h3>📊 Historie analýz</h3>
            <div id="history"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script>
        let model = null;

        async function loadModel() {
            const status = document.getElementById('status');
            status.textContent = "🔄 Načítám AI model... (může trvat 5–15 sekund)";
            
            try {
                model = await tf.loadLayersModel('./model/model.json');
                status.innerHTML = "✅ <strong>AI model je připraven k analýze</strong>";
            } catch(e) {
                status.innerHTML = "❌ Chyba načtení modelu";
            }
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (user === "dispecink" && pass === "riskguard2026") {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                document.getElementById('userDisplay').textContent = user;
                loadModel();
            } else {
                alert("Neplatné přihlašovací údaje!\n\nUživatel: dispecink\nHeslo: riskguard2026");
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = "block";
            document.getElementById('dashboard').style.display = "none";
        }

        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                document.getElementById('preview').innerHTML = 
                    `<img src="${ev.target.result}" id="img" style="max-width:100%;">`;

                const img = document.getElementById('img');
                const status = document.getElementById('status');

                img.onload = async () => {
                    if (!model) {
                        status.textContent = "Model ještě není načten...";
                        return;
                    }

                    status.innerHTML = "🔄 <strong>Provádím analýzu dopravní situace...</strong>";

                    try {
                        const tensor = tf.browser.fromPixels(img)
                            .resizeNearestNeighbor([64, 64])
                            .expandDims(0)
                            .toFloat()
                            .div(255.0);

                        const prediction = model.predict(tensor);
                        const results = await prediction.array();
                        const classes = ['volny_provoz', 'kolona', 'rizikova_situace', 'chodci_cykliste'];
                        const maxIndex = results[0].indexOf(Math.max(...results[0]));
                        const confidence = (results[0][maxIndex] * 100).toFixed(1);

                        let output = `<h3>Detekovaná situace: ${classes[maxIndex].replace('_', ' ').toUpperCase()} (${confidence}%)</h3>`;

                        if (classes[maxIndex] === 'rizikova_situace' || classes[maxIndex] === 'chodci_cykliste') {
                            output += `<div class="high-risk">⚠ VYSOKÉ RIZIKO NEHODY<br>
                            <strong>Doporučení:</strong> Okamžitě informovat hlídku nebo zasáhnout</div>`;
                        } else {
                            output += `<p style="color:#4ade80;">✅ Situace je stabilní.</p>`;
                        }

                        document.getElementById('result').innerHTML = output;
                        status.innerHTML = "✅ Analýza dokončena";

                        saveToHistory(classes[maxIndex], confidence);
                    } catch(err) {
                        status.textContent = "Chyba při analýze";
                    }
                };
            };
            reader.readAsDataURL(file);
        });

        function saveToHistory(situace, confidence) {
            let history = JSON.parse(localStorage.getItem('riskguard_history') || '[]');
            history.unshift({
                cas: new Date().toLocaleString('cs-CZ'),
                situace: situace.replace('_', ' ').toUpperCase(),
                jistota: confidence + "%"
            });
            localStorage.setItem('riskguard_history', JSON.stringify(history));
            showHistory();
        }

        function showHistory() {
            let history = JSON.parse(localStorage.getItem('riskguard_history') || '[]');
            let html = '<table width="100%" style="border-collapse:collapse;"><tr><th>Čas</th><th>Situace</th><th>Jistota</th></tr>';
            history.forEach(item => {
                html += `<tr><td>${item.cas}</td><td>${item.situace}</td><td>${item.jistota}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('history').innerHTML = html;
        }

        window.onload = showHistory;
    </script>
</body>
</html>
